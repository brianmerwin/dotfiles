[defaults]
;ask_vault_pass=False
;become_password_file=
;keep_remote_files=False
action_warnings=True
interpreter_python = auto_silent
ansible_managed=THIS FILE MANAGED VIA ANSIBLE - DO NOT EDIT
collections_on_ansible_version_mismatch=warning
collections_path=./collections:/usr/share/ansible/collections
collections_scan_sys_path=True
deprecation_warnings=False
error_on_undefined_vars=True
force_color=True
forks=5
gathering=smart
home=~/.ansible
host_key_checking=False
localhost_warning=False
# log_path=./logs/ansible_playbook.log
nocolor=False
playbook_dir=./
roles_path=./roles:/usr/share/ansible/roles:/etc/ansible/roles
strategy=linear
timeout=60
transport=smart
# stdout_callback = yaml
# callbacks_enabled = ansible.posix.profile_tasks, timer
callbacks_enabled = timer

[privilege_escalation]
# agnostic_become_prompt=True
become_method=sudo
become_timeout = 60
become_user=root


[persistent_connection]
;ansible_connection_path=
;command_timeout=30
;connect_retry_timeout=15
;connect_timeout=30
;control_path_dir={{ ANSIBLE_HOME ~ "/pc" }}

[colors]
changed=yellow
console_prompt=white
debug=dark gray
deprecate=purple
diff_add=green
diff_lines=cyan
diff_remove=red
error=red
highlight=white
ok=green
skip=cyan
unreachable=bright red
verbose=blue
warn=bright purple


[selinux]
;libvirt_lxc_noseclabel=False
;special_context_filesystems=fuse, nfs, vboxsf, ramfs, 9p, vfat


[diff]
;always=False
;context=3


[galaxy]
collections_path_warning=True
server_list=release_galaxy
server_timeout=15
collection_selection_ignore=^.git$, ^.*/.git_keep$

[galaxy_server.release_galaxy]
url=https://galaxy.ansible.com


[inventory]
enable_plugins=host_list, yaml, ini
# enable_plugins=host_list, yaml, ini, vmware.vmware.vms
# inventory_unparsed_warning=False

[netconf_connection]
# (string) This variable is used to enable bastion/jump host with netconf connection. If set to True the bastion/jump host ssh settings should be present in ~/.ssh/config file, alternatively it can be set to custom ssh configuration file path to read the bastion/jump host settings.
;ssh_config=

[ssh_connection]
ssh_args = -o ControlMaster=auto  -o ControlPersist=60
# ssh_args = -o LogLevel=ERROR
pipelining=True

[jinja2]
# (list) This list of filters avoids 'type conversion' when templating variables
# Useful when you want to avoid conversion into lists or dictionaries for JSON strings, for example.
;dont_type_filters=string, to_json, to_nice_json, to_yaml, to_nice_yaml, ppretty, json

