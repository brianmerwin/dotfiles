---
- name: Check if govc is installed
  ansible.builtin.stat:
    path: "{{ lookup('env', 'HOME') }}/.local/bin/govc"
  register: govc_installed

- name: Ensure ~/.local/bin exists
  ansible.builtin.file:
    path: "{{ lookup('env', 'HOME') }}/.local/bin"
    state: directory
    mode: '0755'
  when: not govc_installed.stat.exists

- name: Download and extract govc
  ansible.builtin.get_url:
    url: "https://github.com/vmware/govmomi/releases/latest/download/govc_{{ ansible_facts['system'] }}_{{ ansible_facts['architecture'] }}.tar.gz"
    dest: /tmp/govc.tar.gz
    mode: '0644'
  when: not govc_installed.stat.exists

- name: Extract govc binary
  ansible.builtin.unarchive:
    src: /tmp/govc.tar.gz
    dest: "{{ lookup('env', 'HOME') }}/.local/bin"
    remote_src: true
  when: not govc_installed.stat.exists

- name: Remove downloaded tarball
  ansible.builtin.file:
    path: /tmp/govc.tar.gz
    state: absent
  when: not govc_installed.stat.exists
