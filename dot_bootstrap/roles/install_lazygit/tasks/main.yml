---
- name: install_lazygit | Check if lazygit is installed
  ansible.builtin.stat:
    path: "{{ lookup('env', 'HOME') }}/.local/bin/lazygit"
  register: lazygit_installed

- name: install_lazygit | Set lazygit architecture fact
  ansible.builtin.set_fact:
    lazygit_arch: "{{ 'arm64' if ansible_facts['architecture'] == 'aarch64' else 'x86_64' }}"

# Initial install
- name: install_lazygit | Get latest lazygit version from GitHub (initial install)
  ansible.builtin.uri:
    url: https://api.github.com/repos/jesseduffield/lazygit/releases/latest
    return_content: true
  register: lazygit_latest_release_init
  when: not lazygit_installed.stat.exists

- name: install_lazygit | Download and extract lazygit
  ansible.builtin.unarchive:
    src: "https://github.com/jesseduffield/lazygit/releases/download/{{ lazygit_latest_release_init.json.tag_name }}/lazygit_{{ lazygit_latest_release_init.json.tag_name | regex_replace('^v', '') }}_linux_{{ lazygit_arch }}.tar.gz"
    dest: "{{ lookup('env', 'HOME') }}/.local/bin/"
    remote_src: true
  when: not lazygit_installed.stat.exists

# Update check
- name: install_lazygit | Get installed lazygit version
  ansible.builtin.command: "{{ lookup('env', 'HOME') }}/.local/bin/lazygit --version"
  register: lazygit_installed_version
  failed_when: false
  changed_when: false
  when: check_for_updates | bool

- name: install_lazygit | Get latest lazygit version from GitHub
  ansible.builtin.uri:
    url: https://api.github.com/repos/jesseduffield/lazygit/releases/latest
    return_content: true
  register: lazygit_latest_release
  when: check_for_updates | bool

- name: install_lazygit | Determine if lazygit update needed
  ansible.builtin.set_fact:
    lazygit_needs_update: >-
      {{ lazygit_installed_version.rc != 0 or
         (lazygit_installed_version.stdout |
          regex_search('[\\d]+\\.[\\d]+\\.[\\d]+') | trim) !=
         (lazygit_latest_release.json.tag_name | regex_replace('^v', '') | trim) }}
  when: check_for_updates | bool

- name: install_lazygit | Download and extract lazygit update
  ansible.builtin.unarchive:
    src: "https://github.com/jesseduffield/lazygit/releases/download/{{ lazygit_latest_release.json.tag_name }}/lazygit_{{ lazygit_latest_release.json.tag_name | regex_replace('^v', '') }}_linux_{{ lazygit_arch }}.tar.gz"
    dest: "{{ lookup('env', 'HOME') }}/.local/bin/"
    remote_src: true
  when: check_for_updates | bool and lazygit_needs_update | bool
