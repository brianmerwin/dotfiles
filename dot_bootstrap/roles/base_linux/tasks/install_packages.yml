---
- name: install_packages | Deploy common packages
  become: true
  ansible.builtin.package:
    state: present
    use: auto
    name: "{{ common_packages }}"

- name: install_packages | Enable CRB repo
  become: true
  ansible.builtin.command:
    cmd: dnf config-manager --enable crb
  when: ansible_facts['os_family'] == 'RedHat'
  ignore_errors: true

- name: install_packages | Deploy RedHat packages
  become: true
  ansible.builtin.dnf:
    update_cache: true
    state: present
    name: "{{ redhat_packages }}"
  when: ansible_facts['os_family'] == 'RedHat'

- name: install_packages | Deploy Debian packages
  become: true
  ansible.builtin.apt:
    update_cache: true
    state: present
    name: "{{ debian_packages }}"
  when: ansible_facts['os_family'] == 'Debian'
