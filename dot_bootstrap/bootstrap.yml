---
- name: Gather user preferences
  hosts: localhost
  gather_facts: false
  vars:
    install_system_packages: false
    check_for_updates: false
  tasks:
    - name: Store preferences as facts
      ansible.builtin.set_fact:
        install_system_packages: "{{ install_system_packages | bool }}"
        check_for_updates: "{{ check_for_updates | bool }}"

- name: Apply bootstrap configurations (Linux - system packages)
  hosts: localhost
  become: false
  environment:
    PYTHONDONTWRITEBYTECODE: "1"
  pre_tasks:
    - name: Skip if not applicable
      ansible.builtin.meta: end_play
      when: >-
        ansible_facts['os_family'] == 'Darwin' or
        not (install_system_packages | bool)
  roles:
    - base_linux

- name: Apply bootstrap configurations (Linux - user binaries)
  hosts: localhost
  become: false
  environment:
    PYTHONDONTWRITEBYTECODE: "1"
  pre_tasks:
    - name: Skip if not applicable
      ansible.builtin.meta: end_play
      when: ansible_facts['os_family'] == 'Darwin'
  roles:
    # - install_docker
    # - install_govc
    # - install_lazyssh
    - install_antidote
    - install_fzf
    - install_glow
    - install_helm
    - install_kubectl
    - install_lazygit
    - install_nb
    - install_neovim
    - install_nerd_fonts
    - install_opencode
    - install_starship
    - install_tree_sitter
    - install_vault

- name: Apply bootstrap configurations (macOS)
  hosts: localhost
  become: false
  environment:
    PYTHONDONTWRITEBYTECODE: "1"
  pre_tasks:
    - name: Skip if not applicable
      ansible.builtin.meta: end_play
      when: ansible_facts['os_family'] != 'Darwin'
  roles:
    - base_macos
    - install_fzf
    - install_glow
    - install_helm
    - install_kubectl
    - install_neovim
    - install_starship
    - install_vault
